name: Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-latest
          - windows-latest
          - ubuntu-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Run tests
        run: hatch run test.py${{ matrix.python-version }}:python -m pytest --numprocesses=logical -s -v tests
        env:
          GITHUB_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

